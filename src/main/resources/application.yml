server:
  port: 8081
  ssl:
    enabled: true
    key-store: classpath:STAR.memmserve.com.p12
    key-store-password: Passw0rd
    key-store-type: PKCS12
    key-alias: my-api-ssl

spring:
  application:
    name: api-gateway-service
  main:
    allow-bean-definition-overriding: true
  cloud:
    gateway:
#      default-filters:
#        - AddResponseHeader=Strict-Transport-Security, max-age=60 ; includeSubDomains
      routes:
#        - id: authentication-service
#          uri: lb://AUTHENTICATION-SERVICE
##          https://authentication-service-production-e98d.up.railway.app #Memmcolapp railway account
#          # https://authentication-service-production-dbcd.up.railway.app #my railway account
#          # lb://AUTHENTICATION-SERVICE
#          predicates:
#            - Path=/smarte/authentication/**
#          filters:
##            - Retry=5  # Retry failed requests up to 5 times
#            - RewritePath=/smarte/authentication/(?<remaining>.*), /${remaining}
##            - name: CircuitBreaker
##              args:
##                name: gatewayService  # The name of the circuit breaker
##                fallbackUri: forward:/api/fallback

        - id: smarte-backend-service
          uri: lb://SMARTE-BACKEND-SERVICE
          predicates:
            - Path=/smarte/v1/api/**  # Routes all requests starting with /smarte/organization to the organization-service
          filters:
            - RewritePath=/smarte/v1/api/(?<remaining>.*), /${remaining} # Strip the prefix

        - id: email-mqtt-client-service
          uri: lb://EMAIL-MQTT-CLIENT-SERVICE
          predicates:
            - Path=/smarte/email/**  # Routes all requests starting with /email to the product-service
          filters:
            - RewritePath=/smarte/email/(?<remaining>.*), /${remaining} # Strip the prefix
#            - CircuitBreaker=name=authenticationCircuitBreaker, fallbackUri=/api/fallback

        - id: gridflex-backend-service
          uri: lb://GRIDFLEX-BACKEND-SERVICE
          predicates:
            - Path=/grid-flex/v1/api/**
          filters:
            - RewritePath=/grid-flex/v1/api/(?<remaining>.*), /${remaining} # Strip the prefix
      #            - CircuitBreaker=name=authenticationCircuitBreaker, fallbackUri=/api/fallback


      globalcors:
          corsConfigurations:
            '[/**]':
              allowedOrigins: "*"
              allowedMethods: "*"
              allowedHeaders: "*"
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
      # https://eureka-service-production-6595.up.railway.app/eureka/
      # https://eureka-service-production.up.railway.app/eureka/
  instance:
    prefer-ip-address: true
    health-check-url-path: /actuator/health
    health-check-interval-seconds: 10

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org.springframework.cloud.gateway: DEBUG


resilience4j:
  circuitbreaker:
    instances:
      gatewayService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s



