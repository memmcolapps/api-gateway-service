name: Deploy Spring Boot to Server

on:
  push:
    branches:
      - staging
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # =====================
      # Checkout
      # =====================
      - name: Checkout code
        uses: actions/checkout@v4

      # =====================
      # Java Setup
      # =====================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # =====================
      # Build
      # =====================
      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests

      # =====================
      # Resolve JAR
      # =====================
      - name: Resolve JAR
        run: |
          JAR_FILE=$(find target -name "*.jar" ! -name "*original*.jar" | head -n 1)

          if [ -z "$JAR_FILE" ]; then
            echo "No JAR found"
            exit 1
          fi

          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_ENV
          echo "Found: $JAR_FILE"

      # =====================================================
      # SSH SETUP (STAGING)
      # =====================================================
      - name: Setup SSH (Staging)
        if: github.ref == 'refs/heads/staging'
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}

      # =====================================================
      # DEPLOY STAGING
      # =====================================================
      - name: Deploy Staging
        if: github.ref == 'refs/heads/staging'
        run: |
          SERVER="${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }}"
          REMOTE_PATH="/${{ secrets.LOCATION }}/api-gateway-service.jar"

          echo "Creating remote directory..."
          ssh -o StrictHostKeyChecking=no $SERVER "mkdir -p /${{ secrets.ENV_FILE }}"

          echo "Uploading JAR..."
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" \
            "$JAR_FILE" \
            $SERVER:$REMOTE_PATH
          
          echo "Writing env file..."
          ssh -o StrictHostKeyChecking=no $SERVER "cat > /${{ secrets.ENV_FILE }}/apigridsec.env" << EOF
          
          EUREKA_ADDRESS="${{ secrets.EUREKA_ADDRESS }}"
          EUREKA_PORT="${{ secrets.EUREKA_PORT }}"
          LOCATION="${{ secrets.LOCATION }}"
          ENV="${{ secrets.ENV_FILE }}"
          KEYSTORE_ALIAS="${{ secrets.KEYSTORE_ALIAS }}"
          KEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}"
          KEYSTORE_TYPE="${{ secrets.KEYSTORE_TYPE }}"
          EOF
          
          ssh -o StrictHostKeyChecking=no $SERVER "chmod 600 /${{ secrets.ENV_FILE }}/apigridsec.env"

          echo "Deploying (safe SSH execution)..."
          ssh -o StrictHostKeyChecking=no $SERVER 'bash -s' << 'EOF'

            set -e

            echo "Stopping app safely..."

            PID=$(ps -ef | grep api-gateway-service.jar | grep -v grep | awk '{print $2}')

            if [ -n "$PID" ]; then
              echo "Killing PID: $PID"
              kill -9 $PID || true
            else
              echo "No running process found"
            fi

            echo "Starting app..."
          
            set -a
            source /${{ secrets.ENV_FILE }}/apigridsec.env
            set +a

            nohup java -Dspring.profiles.active=staging \
              -jar /${{ secrets.LOCATION }}/api-gateway-service.jar &

            echo "Deployment complete"
          EOF

      # =====================================================
      # SSH SETUP (PRODUCTION)
      # =====================================================
      - name: Setup SSH (Production)
        if: github.ref == 'refs/heads/main'
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      # =====================================================
      # DEPLOY PRODUCTION
      # =====================================================
      - name: Deploy Production
        if: github.ref == 'refs/heads/main'
        run: |
          SERVER="${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}"
          REMOTE_PATH="/${{ secrets.LOCATION }}/api-gateway-service.jar"

          echo "Creating remote directory..."
          ssh -o StrictHostKeyChecking=no $SERVER "mkdir -p /${{ secrets.ENV_FILE }}"

          echo "Uploading JAR..."
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" \
            "$JAR_FILE" \
            $SERVER:$REMOTE_PATH
          
          echo "Writing env file..."
          ssh -o StrictHostKeyChecking=no $SERVER "cat > /${{ secrets.ENV_FILE }}/apigridsec.env" << EOF
          
          EUREKA_ADDRESS="${{ secrets.EUREKA_ADDRESS }}"
          EUREKA_PORT="${{ secrets.EUREKA_PORT }}"
          LOCATION="${{ secrets.LOCATION }}"
          ENV="${{ secrets.ENV_FILE }}"
          KEYSTORE_ALIAS="${{ secrets.KEYSTORE_ALIAS }}"
          KEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}"
          KEYSTORE_TYPE="${{ secrets.KEYSTORE_TYPE }}"
          EOF
          
          ssh -o StrictHostKeyChecking=no $SERVER "chmod 600 /${{ secrets.ENV_FILE }}/apigridsec.env"

          echo "Deploying (safe SSH execution)..."
          ssh -o StrictHostKeyChecking=no $SERVER 'bash -s' << 'EOF'

            set -e

            echo "Stopping app safely..."

            PID=$(ps -ef | grep api-gateway-service.jar | grep -v grep | awk '{print $2}')

            if [ -n "$PID" ]; then
              echo "Killing PID: $PID"
              kill -9 $PID || true
            else
              echo "No running process found"
            fi

            echo "Starting app..."
          
            set -a
            source /${{ secrets.ENV_FILE }}/apigridsec.env
            set +a

            nohup java -Dspring.profiles.active=prod \
              -jar /${{ secrets.LOCATION }}/api-gateway-service.jar &

            echo "Deployment complete"
          EOF