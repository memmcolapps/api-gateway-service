      #######################################################
      # Verify Deployment
      #######################################################
      - name: Verify Deployment
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            ${{ secrets.WINDOW_SERVER_USER }}@${{ secrets.WINDOW_SERVER_HOST }} \
            powershell -Command "

            Write-Host ''

            Write-Host '========== SERVICE =========='

            Get-Service api-gateway-service

            Write-Host ''

            Write-Host '========== FILES =========='

            Get-ChildItem C:\momas\api_gateway

            Write-Host ''

            Write-Host '========== LOGS =========='

            Get-ChildItem C:\momas\api_gateway\logs -ErrorAction SilentlyContinue

            "
      #######################################################
      # Display Logs On Failure
      #######################################################
      - name: Display Logs
        if: failure()
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            ${{ secrets.WINDOW_SERVER_USER }}@${{ secrets.WINDOW_SERVER_HOST }} \
            powershell -Command "

            Write-Host ''
            Write-Host '========== WinSW OUT =========='

            if(Test-Path 'C:\momas\api_gateway\api-gateway-service.out.log'){
                Get-Content 'C:\momas\api_gateway\api-gateway-service.out.log' -Tail 100
            }

            Write-Host ''
            Write-Host '========== WinSW ERR =========='

            if(Test-Path 'C:\momas\api_gateway\api-gateway-service.err.log'){
                Get-Content 'C:\momas\api_gateway\api-gateway-service.err.log' -Tail 100
            }

            Write-Host ''
            Write-Host '========== WRAPPER LOG =========='

            if(Test-Path 'C:\momas\api_gateway\wrapper.log'){
                Get-Content 'C:\momas\api_gateway\wrapper.log' -Tail 100
            }

            Write-Host ''
            Write-Host '========== SPRING LOG =========='

            if(Test-Path 'C:\momas\api_gateway\logs\apigateway.log'){
                Get-Content 'C:\momas\api_gateway\logs\apigateway.log' -Tail 100
            }

            Write-Host ''
            Write-Host '========== GC LOG =========='

            if(Test-Path 'C:\momas\api_gateway\logs\gc.log'){
                Get-Content 'C:\momas\api_gateway\logs\gc.log' -Tail 100
            }

            "

