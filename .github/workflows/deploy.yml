name: Deploy Spring Boot to Server

on:
  push:
    branches:
      - staging
      - main
      - window

jobs:
  deploy-linux:
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      # =====================
      # Checkout
      # =====================
      - name: Checkout code
        uses: actions/checkout@v4

      # =====================
      # Java Setup
      # =====================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # =====================
      # Build
      # =====================
      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests

      # =====================
      # Resolve JAR
      # =====================
      - name: Resolve JAR
        run: |
          JAR_FILE=$(find target -name "*.jar" ! -name "*original*.jar" | head -n 1)

          if [ -z "$JAR_FILE" ]; then
            echo "No JAR found"
            exit 1
          fi

          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_ENV
          echo "Found: $JAR_FILE"

      # =====================================================
      # SSH SETUP (STAGING)
      # =====================================================
      - name: Setup SSH (Staging)
        if: github.ref == 'refs/heads/staging'
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}

      # =====================================================
      # DEPLOY STAGING
      # =====================================================
      - name: Deploy Staging
        if: github.ref == 'refs/heads/staging'
        run: |
          SERVER="${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }}"
          REMOTE_PATH="/${{ secrets.LOCATION }}/api-gateway-service.jar"

          echo "Creating remote directory..."
          ssh -o StrictHostKeyChecking=no $SERVER "mkdir -p /${{ secrets.LOCATION }}"

          echo "Uploading JAR..."
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" \
            "$JAR_FILE" \
            $SERVER:$REMOTE_PATH
          
          echo "Writing env file..."
          ssh -o StrictHostKeyChecking=no $SERVER "cat > /${{ secrets.LOCATION }}/.env.apigateway" << EOF
          
          EUREKA_ADDRESS="${{ secrets.EUREKA_ADDRESS }}"
          EUREKA_PORT="${{ secrets.EUREKA_PORT }}"
          LOCATION="${{ secrets.LOCATION }}"
          ENV="${{ secrets.ENV_FILE }}"
          KEYSTORE_ALIAS="${{ secrets.KEYSTORE_ALIAS }}"
          KEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}"
          KEYSTORE_TYPE="${{ secrets.KEYSTORE_TYPE }}"
          EOF
          
          ssh -o StrictHostKeyChecking=no $SERVER "chmod 600 /${{ secrets.LOCATION }}/.env.apigateway"

          echo "Deploying (safe SSH execution)..."
          ssh -o StrictHostKeyChecking=no $SERVER 'bash -s' << 'EOF'

            set -e

            echo "Stopping app safely..."

            PID=$(ps -ef | grep api-gateway-service.jar | grep -v grep | awk '{print $2}')

            if [ -n "$PID" ]; then
              echo "Killing PID: $PID"
              kill -9 $PID || true
            else
              echo "No running process found"
            fi

            echo "Starting app..."
          
            set -a
            source /${{ secrets.LOCATION }}/.env.apigateway
            set +a

            nohup java -Dspring.profiles.active=staging \
              -jar /${{ secrets.LOCATION }}/api-gateway-service.jar \
              >/dev/null 2>&1 < /dev/null &

            echo "Deployment complete"
          EOF

      # =====================================================
      # SSH SETUP (PRODUCTION)
      # =====================================================
      - name: Setup SSH (Production)
        if: github.ref == 'refs/heads/main'
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      # =====================================================
      # DEPLOY PRODUCTION
      # =====================================================
      - name: Deploy Production
        if: github.ref == 'refs/heads/main'
        run: |
          SERVER="${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}"
          REMOTE_PATH="/${{ secrets.LOCATION }}/api-gateway-service.jar"

          echo "Creating remote directory..."
          ssh -o StrictHostKeyChecking=no $SERVER "mkdir -p /${{ secrets.LOCATION }}"

          echo "Uploading JAR..."
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" \
            "$JAR_FILE" \
            $SERVER:$REMOTE_PATH
          
          echo "Writing env file..."
          ssh -o StrictHostKeyChecking=no $SERVER "cat > /${{ secrets.LOCATION }}/.env.apigateway" << EOF
          
          EUREKA_ADDRESS="${{ secrets.EUREKA_ADDRESS }}"
          EUREKA_PORT="${{ secrets.EUREKA_PORT }}"
          LOCATION="${{ secrets.LOCATION }}"
          ENV="${{ secrets.ENV_FILE }}"
          KEYSTORE_ALIAS="${{ secrets.KEYSTORE_ALIAS }}"
          KEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}"
          KEYSTORE_TYPE="${{ secrets.KEYSTORE_TYPE }}"
          EOF
          
          ssh -o StrictHostKeyChecking=no $SERVER "chmod 600 /${{ secrets.LOCATION }}/.env.apigateway"

          echo "Deploying (safe SSH execution)..."
          ssh -o StrictHostKeyChecking=no $SERVER 'bash -s' << 'EOF'

            set -e

            echo "Stopping app safely..."

            PID=$(ps -ef | grep api-gateway-service.jar | grep -v grep | awk '{print $2}')

            if [ -n "$PID" ]; then
              echo "Killing PID: $PID"
              kill -9 $PID || true
            else
              echo "No running process found"
            fi

            echo "Starting app..."
          
            set -a
            source /${{ secrets.LOCATION }}/.env.apigateway
            set +a

            nohup java -Dspring.profiles.active=prod \
              -jar /${{ secrets.LOCATION }}/api-gateway-service.jar \
              >/dev/null 2>&1 < /dev/null &

            echo "Deployment complete"
          EOF
          
          

  deploy-windows:

    if: github.ref == 'refs/heads/window'

    runs-on: ubuntu-latest

    env:
      APP_NAME: api-gateway-service
      SERVICE_NAME: api-gateway-service
      DEPLOY_DIR: 'C:\momas\api_gateway'
      JAR_NAME: api-gateway-service.jar

    steps:
      #######################################################
      # Checkout Repository
      #######################################################
      - name: Checkout Repository
        uses: actions/checkout@v4

      #######################################################
      # Setup Java
      #######################################################
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # ==========================
      # Build
      # ==========================
      - name: Build Application
        run: mvn clean package -DskipTests

      #######################################################
      # Locate JAR
      #######################################################
      - name: Locate Executable JAR
        shell: bash
        run: |

          JAR=$(find . \
            -type f \
            -path "*/target/*.jar" \
            ! -name "*sources.jar" \
            ! -name "*javadoc.jar" \
            ! -name "*original*.jar" \
            | head -n1)

          if [ -z "$JAR" ]; then
            echo "Executable jar not found."
            exit 1
          fi

          echo "Found: $JAR"

          cp "$JAR" app.jar

      #######################################################
      # Generate WinSW XML
      #######################################################
      - name: Generate WinSW XML
        shell: bash
        run: |
          
          cp deployment/api-gateway-service.xml.template api-gateway-service.xml
          
          sed -i "s|\${EUREKA_ADDRESS}|${{ secrets.EUREKA_ADDRESS }}|g" api-gateway-service.xml
          sed -i "s|\${EUREKA_PORT}|${{ secrets.EUREKA_PORT }}|g" api-gateway-service.xml
          sed -i "s|\${WIN_LOCATION}|C:/${{secret.WIN_LOCATION}}|g" api-gateway-service.xml
          sed -i "s|\${KEYSTORE_ALIAS}|${{ secrets.KEYSTORE_ALIAS }}|g" api-gateway-service.xml
          sed -i "s|\${KEYSTORE_PASSWORD}|${{ secrets.KEYSTORE_PASSWORD }}|g" api-gateway-service.xml
          sed -i "s|\${KEYSTORE_TYPE}|${{ secrets.KEYSTORE_TYPE }}|g" api-gateway-service.xml
          
          echo "Generated WinSW XML:"
          
          cat api-gateway-service.xml

      #######################################################
      # Configure SSH
      #######################################################
      - name: Configure SSH
        shell: bash
        run: |

          mkdir -p ~/.ssh

          echo "${{ secrets.WINDOW_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan ${{ secrets.WINDOW_SERVER_HOST }} >> ~/.ssh/known_hosts
          
      #######################################################
      # Create Deployment Directory
      #######################################################
      - name: Create Deployment Directory
        run: |

          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            ${{ secrets.WINDOW_SERVER_USER }}@${{ secrets.WINDOW_SERVER_HOST }} \
            "powershell -NoProfile -Command \"
          
          \$ErrorActionPreference='Stop'

          New-Item `
            -ItemType Directory `
            -Force `
            -Path '${{ env.DEPLOY_DIR }}' | Out-Null

          New-Item `
            -ItemType Directory `
            -Force `
            -Path '${{ env.DEPLOY_DIR }}\logs' | Out-Null
          
          Write-Host 'Deployment directory ready.'

          \""

      #######################################################
      # Stop WinSW Service
      #######################################################
      - name: Stop Windows Service
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            ${{ secrets.WINDOW_SERVER_USER }}@${{ secrets.WINDOW_SERVER_HOST }} \
            "powershell -NoProfile -NonInteractive -" <<'EOF'

          $ErrorActionPreference = 'Stop'

          $service = Get-Service -Name 'api-gateway-service' -ErrorAction Stop

          Write-Host "Current Status: $($service.Status)"

          if ($service.Status -eq 'Running') {

              Write-Host "Stopping service..."

              Stop-Service -Name 'api-gateway-service'

              $service.WaitForStatus(
                  'Stopped',
                  '00:00:30'
              )

          }

          $service = Get-Service -Name 'api-gateway-service'

          if ($service.Status -ne 'Stopped') {

              throw "Failed to stop service."

          }

          Write-Host "Service stopped successfully."

          EOF

      #######################################################
      # Backup Existing JAR
      #######################################################
      - name: Backup Existing JAR
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            ${{ secrets.WINDOW_SERVER_USER }}@${{ secrets.WINDOW_SERVER_HOST }} \
            "powershell -NoProfile -NonInteractive -" <<'EOF'

          $ErrorActionPreference='Stop'

          $jar="C:\momas\api_gateway\api-gateway-service.jar"

          $backup="C:\momas\api_gateway\api-gateway-service.jar.bak"

          if(Test-Path $jar){

              Copy-Item `
                  $jar `
                  $backup `
                  -Force

              Write-Host "Backup completed."

          }
          else{

              Write-Host "No existing JAR. Backup skipped."

          }

          EOF

      #######################################################
      # Upload New JAR
      #######################################################
      - name: Upload Application
        run: |

          scp \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            app.jar \
            "${{ secrets.WINDOW_SERVER_USER }}@${{ secrets.WINDOW_SERVER_HOST }}:/C:/momas/api_gateway/api-gateway-service.jar"

      #######################################################
      # Upload WinSW XML
      #######################################################
      - name: Upload WinSW XML
        run: |
          scp \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            api-gateway-service.xml \
            "${{ secrets.WINDOW_SERVER_USER }}@${{ secrets.WINDOW_SERVER_HOST }}:/C:/momas/api_gateway/api-gateway-service.xml"

      #######################################################
      # Verify Uploaded Files
      #######################################################
      - name: Verify Upload
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            ${{ secrets.WINDOW_SERVER_USER }}@${{ secrets.WINDOW_SERVER_HOST }} \
            powershell -Command "

            \$files = @(
                'C:\momas\api_gateway\api-gateway-service.exe',
                'C:\momas\api_gateway\api-gateway-service.jar',
                'C:\momas\api_gateway\api-gateway-service.xml'
            )

            foreach(\$file in \$files){

                if(!(Test-Path \$file)){
                    throw \"Missing: \$file\"
                }

                Write-Host \"Verified: \$file\"

            }

            Get-ChildItem C:\momas\api_gateway

            "

      #######################################################
      # Start Windows Service
      #######################################################
      - name: Start Windows Service
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            ${{ secrets.WINDOW_SERVER_USER }}@${{ secrets.WINDOW_SERVER_HOST }} \
            "powershell -NoProfile -NonInteractive -" <<'EOF'

          $ErrorActionPreference='Stop'

          Write-Host "Starting api-gateway-service..."

          Start-Service -Name "api-gateway-service"

          Start-Sleep -Seconds 5

          $service = Get-Service -Name "api-gateway-service"

          $service.WaitForStatus(
              "Running",
              "00:00:30"
          )

          $service = Get-Service -Name "api-gateway-service"

          if($service.Status -ne "Running"){

              throw "Service failed to start."

          }

          Write-Host "Service started successfully."

          EOF

      #######################################################
      # Stop WinSW Service
      #######################################################
      - name: Stop Windows Service
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            ${{ secrets.WINDOW_SERVER_USER }}@${{ secrets.WINDOW_SERVER_HOST }} \
            "powershell -NoProfile -NonInteractive -" <<'EOF'

          $ErrorActionPreference = 'Stop'

          $service = Get-Service -Name 'api-gateway-service' -ErrorAction Stop

          Write-Host "Current Status: $($service.Status)"

          if ($service.Status -eq 'Running') {

              Write-Host "Stopping service..."

              Stop-Service -Name 'api-gateway-service' -Force

              $service.WaitForStatus('Stopped','00:00:30')

          }

          $service = Get-Service -Name 'api-gateway-service'

          if ($service.Status -ne 'Stopped') {

              throw "Failed to stop service."

          }

          Write-Host "Service stopped successfully."

          EOF

      #######################################################
      # Start Windows Service
      #######################################################
      - name: Start Windows Service
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            ${{ secrets.WINDOW_SERVER_USER }}@${{ secrets.WINDOW_SERVER_HOST }} \
            "powershell -NoProfile -NonInteractive -" <<'EOF'

          $ErrorActionPreference='Stop'

          if(!(Test-Path "C:\momas\api_gateway\api-gateway-service.jar")){

              throw "Deployment jar missing."

          }

          Write-Host "Starting service..."

          Start-Service -Name 'api-gateway-service'

          (Get-Service -Name 'api-gateway-service').WaitForStatus(
              'Running',
              '00:00:30'
          )

          $service=Get-Service -Name 'api-gateway-service'

          if($service.Status -ne 'Running'){

              throw "Service failed to start."

          }

          Write-Host "Service started successfully."

          EOF

      #######################################################
      # Verify Java Process
      #######################################################
      - name: Verify Java Process
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            ${{ secrets.WINDOW_SERVER_USER }}@${{ secrets.WINDOW_SERVER_HOST }} \
            "powershell -NoProfile -NonInteractive -" <<'EOF'

          $ErrorActionPreference='Stop'

          $java = Get-CimInstance Win32_Process |
          Where-Object {

              $_.Name -eq "java.exe" -and
              $_.CommandLine -like "*api-gateway-service.jar*"

          }

          if(!$java){

              throw "Java process not running."

          }

          Write-Host "Java PID: $($java.ProcessId)"

          EOF

      #######################################################
      # Verify Java Process
      #######################################################
      - name: Verify Java Process
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            ${{ secrets.WINDOW_SERVER_USER }}@${{ secrets.WINDOW_SERVER_HOST }} \
            "powershell -NoProfile -NonInteractive -" <<'EOF'

          $ErrorActionPreference='Stop'

          $java = Get-CimInstance Win32_Process |
          Where-Object {

              $_.Name -eq "java.exe" -and
              $_.CommandLine -like "*api-gateway-service.jar*"

          }

          if(!$java){

              throw "Java process not running."

          }

          Write-Host "Java PID: $($java.ProcessId)"

          EOF

